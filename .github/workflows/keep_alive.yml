name: Website Keep Alive

on:
  schedule:
    # 每天 0点、6点、12点、18点 自动运行（每6小时一次，远超30天10次的要求）
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # 支持手动点击运行测试

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Visit Website
        run: |
          # 定义你的网站地址（可以放多个）
          URLS=("http://upic.rf.gd" "https://5399navi.liveblog365.com" "https://e-netek.freehostcn.com")
          
          for url in "${URLS[@]}"; do
            echo "正在访问: $url"
            # 使用 curl 模拟真实浏览器访问
            curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/110.0.0.0 Safari/537.36" \
                 -sL --connect-timeout 20 "$url" > /dev/null
            echo "访问完成: $url"
          done
