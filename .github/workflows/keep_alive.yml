name: Global Website Keep Alive

on:
  schedule:
    # 每天北京时间 08:00, 14:00, 20:00, 02:00 自动运行
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # 支持手动点击运行测试

jobs:
  ping_job:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Visits
        run: |
          # 将 Secrets 内容转换为数组并逐行读取
          echo "${{ secrets.MY_URL }}" | while read -r url; do
            # 过滤掉空行
            if [ -z "$url" ]; then continue; fi
            
            # 如果你在某个网址前加了 # 号注释，也可以自动跳过
            if [[ "$url" == \#* ]]; then continue; fi
            
            echo "------------------------------------------"
            echo "🚀 正在尝试访问: $url"
            
            # 【优化重点】：
            # 1. 移除 --retry 3，防止失效网站原地反复重试浪费时间
            # 2. 将 --connect-timeout 降为 5 秒，快速响应
            # 3. 增加 -m 10 (最大总耗时10秒)，防止页面太大传输数据时卡死
            RESPONSE=$(curl -skL --connect-timeout 5 -m 10 \
                 -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                 -w "%{http_code}" \
                 "$url" -o /dev/null)
            
            # 根据状态码智能判断并输出日志
            if [ "$RESPONSE" -eq 000 ]; then
              echo "⚠️  跳过 | 该网站连接超时或网络不可达，已自动跳过！"
            elif [ "$RESPONSE" -ge 400 ]; then
              echo "❌ 异常 | 状态码: $RESPONSE | 网站可能报错，但已成功触发保活请求！"
            else
              echo "✅ 成功 | 状态码: $RESPONSE | 目标: $url"
            fi

          done
          echo "------------------------------------------"
          echo "🎉 所有保活任务已完成！"
