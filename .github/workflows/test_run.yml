name: Test x10hosting Run
on:
  workflow_dispatch: # 允许手动点击运行

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v4

      - name: 2. 安装 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 安装 requests 依赖
        run: pip install requests # 直接安装脚本需要的库

      - name: 4. 运行脚本测试
        env:
          # 将 GitHub Secrets 映射为 Python 脚本能读取的环境变量
          XSRF_TOKEN: ${{ secrets.XSRF_TOKEN }}
          X10HOSTING_SESSION: ${{ secrets.X10HOSTING_SESSION }}
          run: ls -R
           echo "=== 当前目录下的所有文件如下 ==="
          ls -R
          echo "================================"
        run: python mystuff/pyrun.py # ⚠️ 记得改成你实际的 py 文件名
