<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Atlas - 精准校准版</title>
    <style>
        :root {
            --accent: #38bdf8;
            --glass: rgba(0, 0, 0, 0.5);
            --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            min-height: 100vh; width: 100vw;
            display: flex; flex-direction: column; align-items: center;
            background: #000; color: white; overflow: hidden;
            perspective: 2000px;
        }

        #bgImage {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background-size: cover; background-position: center;
            filter: brightness(0.6) blur(2px); transition: 1s;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; background: rgba(0,0,0,0.5); backdrop-filter: blur(30px);
            display: none; cursor: pointer;
        }

        .main-title { margin: 40px 0 10px; font-size: 2rem; font-weight: 200; letter-spacing: 12px; z-index: 10; opacity: 0.8; }

        .map-wrapper {
            position: relative;
            width: 90%; max-width: 1100px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px;
            z-index: 10;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            transition: var(--transition);
        }

        .map-image {
            width: 100%;
            display: block;
            border-radius: 20px;
            /* 保持你喜欢的暗蓝科技感处理 */
            filter: invert(1) opacity(0.2) drop-shadow(0 0 2px var(--accent));
        }

        .hotspot {
            position: absolute;
            width: 10px; height: 10px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--accent);
            z-index: 20;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
			/* --- 核心修正：集体向左上移动 --- */
            margin-top: -35px;  /* 向上移动约 1cm */
            margin-left: -35px; /* 向左移动约 1cm */
        }
        }

        .hotspot:hover {
            background: #fff;
            transform: translate(-50%, -50%) scale(1.8);
            box-shadow: 0 0 25px var(--accent);
        }
        
        .hotspot span {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            font-size: 0.7rem; font-weight: 600; white-space: nowrap; opacity: 0;
            transition: 0.3s; letter-spacing: 1px; pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .hotspot:hover span { opacity: 1; bottom: 20px; }

        .hotspot::before {
            content: ''; position: absolute; top: -100%; left: -100%; width: 300%; height: 300%;
            border-radius: 50%; border: 1px solid var(--accent);
            animation: pulse 2s infinite; opacity: 0;
        }
        @keyframes pulse {
            0% { transform: scale(0.3); opacity: 0.8; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        #focusDisplay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 101; text-align: center; pointer-events: none; display: none;
        }
        .f-city { font-size: 3rem; font-weight: 600; color: var(--accent); letter-spacing: 10px; }
        .f-time { font-size: clamp(5rem, 15vw, 12rem); font-weight: 200; line-height: 1; margin: 20px 0; }

        .footer { position: fixed; bottom: 15px; font-size: 0.7rem; color: rgba(255,255,255,0.3); z-index: 5; }
    </style>
</head>
<body>

    <div id="bgImage"></div>
    <div id="overlay" onclick="closeFocus()"></div>

    <h1 class="main-title">GLOBAL TIMES</h1>

    <div class="map-wrapper" id="mapFrame">
        <img class="map-image" src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg" alt="World Map">

        <div class="hotspot" style="top: 37.8%; left: 82.2%;" onclick="showTime('北京', 'Asia/Beijing')"><span>BEIJING</span></div>
		<div class="hotspot" style="top: 45.8%; left: 85.2%;" onclick="showTime('台北', 'Asia/Taipei')"><span>TAIPEI</span></div>
		<div class="hotspot" style="top: 38.8%; left: 85.5%;" onclick="showTime('首尔', 'Asia/Seoul')"><span>SEOUL</span></div>
        <div class="hotspot" style="top: 38.2%; left: 89.2%;" onclick="showTime('东京', 'Asia/Tokyo')"><span>TOKYO</span></div>
        <div class="hotspot" style="top: 33.5%; left: 51.0%;" onclick="showTime('伦敦', 'Europe/London')"><span>LONDON</span></div>
        <div class="hotspot" style="top: 38.8%; left: 31.3%;" onclick="showTime('纽约', 'America/New_York')"><span>NEW YORK</span></div>
        <div class="hotspot" style="top: 28.9%; left: 59.8%;" onclick="showTime('莫斯科', 'Europe/Moscow')"><span>MOSCOW</span></div>
        <div class="hotspot" style="top: 80.5%; left: 92.0%;" onclick="showTime('悉尼', 'Australia/Sydney')"><span>SYDNEY</span></div>
        <div class="hotspot" style="top: 70.9%; left: 38.0%;" onclick="showTime('圣保罗', 'America/Sao_Paulo')"><span>SAO PAULO</span></div>
        <div class="hotspot" style="top: 47.5%; left: 66.3%;" onclick="showTime('迪拜', 'Asia/Dubai')"><span>DUBAI</span></div>
        <div class="hotspot" style="top: 35.5%; left: 51.3%;" onclick="showTime('巴黎', 'Europe/Paris')"><span>PARIS</span></div>
        <div class="hotspot" style="top: 40.5%; left: 18.5%;" onclick="showTime('洛杉矶', 'America/Los_Angeles')"><span>LOS ANGELES</span></div>
        <div class="hotspot" style="top: 57.9%; left: 81.0%;" onclick="showTime('新加坡', 'Asia/Singapore')"><span>SINGAPORE</span></div>
        <div class="hotspot" style="top: 72.0%; left: 60.3%;" onclick="showTime('约翰内斯堡', 'Africa/Johannesburg')"><span>JOHANNESBURG</span></div>
    </div>

    <div id="focusDisplay">
        <div class="f-city" id="fCity">CITY</div>
        <div class="f-time" id="fTime">00:00:00</div>
        <div id="fDate" style="opacity: 0.5; font-size: 1.5rem; letter-spacing: 2px;">DATE</div>
    </div>

    <div class="footer">© 2026 Crafted by AI Assistant • Precision Calibrated</div>

    <script>
        let activeTz = null;
        let updateInterval = null;

        const id = Math.floor(Math.random() * 1050);
        document.getElementById('bgImage').style.backgroundImage = `url('https://picsum.photos/id/${id}/1920/1080')`;

        function showTime(name, tz) {
            activeTz = tz;
            document.getElementById('fCity').innerText = name;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('focusDisplay').style.display = 'block';
            document.getElementById('mapFrame').style.transform = 'scale(0.9) translateZ(-100px)';
            document.getElementById('mapFrame').style.opacity = '0';
            
            tick();
            if(updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(tick, 1000);
        }

        function tick() {
            if(!activeTz) return;
            const now = new Date();
            document.getElementById('fTime').innerText = now.toLocaleTimeString('en-GB', { timeZone: activeTz, hour12: false });
            document.getElementById('fDate').innerText = now.toLocaleDateString('zh-CN', { timeZone: activeTz, dateStyle: 'full' });
        }

        function closeFocus() {
            activeTz = null;
            clearInterval(updateInterval);
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('focusDisplay').style.display = 'none';
            document.getElementById('mapFrame').style.transform = 'scale(1) translateZ(0)';
            document.getElementById('mapFrame').style.opacity = '1';
        }

        document.addEventListener('mousemove', (e) => {
            if(window.innerWidth < 768) return;
            const moveX = (e.clientX / window.innerWidth - 0.5) * 10;
            const moveY = (e.clientY / window.innerHeight - 0.5) * 10;
            document.getElementById('mapFrame').style.transform = `rotateX(${-moveY}deg) rotateY(${moveX}deg)`;
        });
    </script>
</body>
</html>
