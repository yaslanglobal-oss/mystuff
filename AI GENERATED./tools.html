<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Tools - 极简时钟工具箱</title>
    <style>
        :root {
            --accent: #38bdf8;
            --glass-dark: rgba(0, 0, 0, 0.45);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            --text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            min-height: 100vh; width: 100vw;
            display: flex; flex-direction: column; align-items: center; 
            background: #000; color: white; overflow-x: hidden;
            perspective: 1500px;
        }

        /* --- 视差背景层 --- */
        #bgContainer {
            position: fixed; top: -5%; left: -5%; width: 110%; height: 110%;
            z-index: -1; transform-style: preserve-3d;
            transition: transform 0.1s ease-out; overflow: hidden;
        }
        #bgImage {
            width: 100%; height: 100%;
            background-size: cover; background-position: center;
            filter: brightness(0.5); transition: filter 0.8s ease;
        }

        .main-title {
            margin: 60px 0 30px; font-size: 2.5rem; font-weight: 200; 
            letter-spacing: 12px; text-transform: uppercase;
            text-shadow: var(--text-shadow); z-index: 10;
        }
        .main-title a { text-decoration: none; color: inherit; transition: 0.3s; }
        .main-title a:hover { color: var(--accent); text-shadow: 0 0 20px var(--accent); }

        .container {
            width: 100%; max-width: 1000px; padding: 20px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 30px; z-index: 10;
        }

        .tool-card {
            background: var(--glass-dark); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 25px;
            padding: 40px 30px; text-align: center;
            transition: var(--transition); box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .tool-card:hover { border-color: var(--accent); transform: translateY(-5px) translateZ(20px); }
        
        /* 闹铃响时的动画 */
        .tool-card.ringing { animation: pulse-red 1s infinite; border-color: #ff4757; }
        @keyframes pulse-red {
            50% { box-shadow: 0 0 50px rgba(255, 71, 87, 0.5); background: rgba(255, 71, 87, 0.1); }
        }

        .label { font-size: 1.1rem; font-weight: 500; letter-spacing: 2px; margin-bottom: 20px; color: var(--accent); }
        .display { font-size: 3.5rem; font-weight: 300; margin: 20px 0; font-variant-numeric: tabular-nums; }
        
        input {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px; color: white; padding: 12px; font-size: 1.2rem;
            text-align: center; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.2); }

        .btn-group { display: flex; justify-content: center; gap: 15px; margin-top: 25px; }
        button {
            padding: 12px 28px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.3);
            background: transparent; color: white; cursor: pointer; transition: 0.3s;
            font-size: 0.85rem; letter-spacing: 1px; font-weight: 600;
        }
        button.primary { background: var(--accent); color: #000; border: none; }
        button.primary:hover { box-shadow: 0 0 20px var(--accent); background: #fff; }

        /* 点击波纹 */
        .click-ripple {
            position: fixed; z-index: 999; border: 2px solid var(--accent);
            border-radius: 50%; pointer-events: none;
            transform: translate(-50%, -50%) scale(0);
            animation: ripple-effect 0.6s ease-out;
        }
        @keyframes ripple-effect { to { transform: translate(-50%, -50%) scale(1); opacity: 0; width: 300px; height: 300px; } }

        @media (max-width: 768px) {
            .main-title { font-size: 1.8rem; margin: 40px 0; }
            #bgContainer { transform: none !important; }
        }
    </style>
</head>
<body>

    <div id="bgContainer"><div id="bgImage"></div></div>
    
    <h1 class="main-title"><a href="index.html">Time Tools</a></h1>

    <div class="container">
        <div class="tool-card" id="timerCard">
            <div class="label">COUNTDOWN</div>
            <div class="display" id="timerDisplay">00:00</div>
            <div id="timerInputs">
                <input type="number" id="minInput" style="width: 70px" placeholder="00">
                <span style="opacity: 0.5"> : </span>
                <input type="number" id="secInput" style="width: 70px" placeholder="00">
            </div>
            <div class="btn-group">
                <button class="primary" id="startTimer">START</button>
                <button id="resetTimer">RESET</button>
            </div>
        </div>

        <div class="tool-card" id="alarmCard">
            <div class="label">ALARM</div>
            <div class="display" id="alarmStatus">OFF</div>
            <input type="time" id="alarmTime" style="width: 180px">
            <div class="btn-group">
                <button class="primary" id="setAlarm">SET ALARM</button>
                <button id="cancelAlarm">CANCEL</button>
            </div>
        </div>
    </div>

    <audio id="alarmSound" loop src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        // --- 1. 背景与交互逻辑 (同步主页) ---
        const bgContainer = document.getElementById('bgContainer');
        const bgImage = document.getElementById('bgImage');
        const alarmSound = document.getElementById('alarmSound');

        function initInteractions() {
            // 随机壁纸
            const randomId = Math.floor(Math.random() * 1050);
            bgImage.style.backgroundImage = `url('https://picsum.photos/id/${randomId}/1920/1080')`;

            // 视差
            document.addEventListener('mousemove', (e) => {
                if(window.innerWidth < 768) return;
                const ox = (e.clientX / window.innerWidth) - 0.5;
                const oy = (e.clientY / window.innerHeight) - 0.5;
                bgContainer.style.transform = `rotateX(${oy * -5}deg) rotateY(${ox * 8}deg)`;
            });

            // 波纹
            document.addEventListener('click', (e) => {
                const r = document.createElement('div');
                r.className = 'click-ripple';
                r.style.left = e.clientX + 'px';
                r.style.top = e.clientY + 'px';
                document.body.appendChild(r);
                r.onanimationend = () => r.remove();
            });
        }

        // --- 2. 倒计时逻辑 ---
        let timeLeft = 0, timerId = null;
        const timerDisplay = document.getElementById('timerDisplay');
        const timerCard = document.getElementById('timerCard');

        document.getElementById('startTimer').onclick = function() {
            if (timerId) {
                clearInterval(timerId); timerId = null;
                this.innerText = 'START'; return;
            }
            if (timeLeft <= 0) {
                const m = parseInt(document.getElementById('minInput').value) || 0;
                const s = parseInt(document.getElementById('secInput').value) || 0;
                timeLeft = m * 60 + s;
            }
            if (timeLeft <= 0) return;

            this.innerText = 'PAUSE';
            timerId = setInterval(() => {
                timeLeft--;
                const mm = Math.floor(timeLeft/60).toString().padStart(2,'0');
                const ss = (timeLeft%60).toString().padStart(2,'0');
                timerDisplay.innerText = `${mm}:${ss}`;
                if (timeLeft <= 0) {
                    clearInterval(timerId); timerId = null;
                    playAlarm(timerCard);
                    this.innerText = 'START';
                }
            }, 1000);
        };

        document.getElementById('resetTimer').onclick = () => {
            clearInterval(timerId); timerId = null; timeLeft = 0;
            timerDisplay.innerText = "00:00"; stopAlarm(timerCard);
            document.getElementById('startTimer').innerText = 'START';
        };

        // --- 3. 闹钟逻辑 ---
        let targetTime = null, alarmId = null;
        const alarmStatus = document.getElementById('alarmStatus');
        const alarmCard = document.getElementById('alarmCard');

        document.getElementById('setAlarm').onclick = function() {
            const val = document.getElementById('alarmTime').value;
            if(!val) return;
            targetTime = val;
            alarmStatus.innerText = "AT " + val;
            alarmStatus.style.color = "var(--accent)";
            
            if(alarmId) clearInterval(alarmId);
            alarmId = setInterval(() => {
                const now = new Date();
                const cur = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
                if(cur === targetTime) {
                    clearInterval(alarmId);
                    playAlarm(alarmCard);
                }
            }, 1000);
        };

        document.getElementById('cancelAlarm').onclick = () => {
            clearInterval(alarmId); 
            alarmStatus.innerText = "OFF";
            alarmStatus.style.color = "white";
            stopAlarm(alarmCard);
        };

        // --- 4. 警报控制 ---
        function playAlarm(card) {
            alarmSound.play();
            card.classList.add('ringing');
            // 弹出原生提示框，用户点击后停止声音
            setTimeout(() => {
                if(confirm("时间到！点击确定关闭警报")) {
                    stopAlarm(card);
                }
            }, 100);
        }

        function stopAlarm(card) {
            alarmSound.pause();
            alarmSound.currentTime = 0;
            card.classList.remove('ringing');
        }

        initInteractions();
    </script>
</body>
</html>
