<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock - 世界时钟</title>
  <style>
    :root {
        --accent: #38bdf8;
        --glass-white: rgba(255, 255, 255, 0.18);
        --glass-dark: rgba(0, 0, 0, 0.35);
        --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        --text-shadow: 0 2px 5px rgba(0, 0, 0, 0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

    body {
        /* 修改点：最小高度 100vh，允许滚动 */
        min-height: 100vh; width: 100vw;
        display: flex; flex-direction: column; align-items: center; 
        overflow-y: auto; overflow-x: hidden;
        background: #000; color: white;
        perspective: 1500px;
    }

    /* 聚焦状态下锁定背景滚动，防止位移 */
    body.is-focused { overflow: hidden; }

    /* --- 3D 视差背景容器 --- */
    #bgContainer {
        position: fixed; top: -5%; left: -5%; width: 110%; height: 110%;
        z-index: 1;
        transform-style: preserve-3d;
        transform: rotateX(0deg) rotateY(0deg) translateZ(0px);
        transition: transform 0.1s ease-out; 
        overflow: hidden;
    }

    #bgImage {
        width: 100%; height: 100%;
        background-size: cover; background-position: center;
        filter: brightness(0.8);
        transition: filter 0.8s ease;
    }

    #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 5; background: rgba(0,0,0,0);
        display: none; transition: background 0.5s;
    }

    /* --- 主标题（支持点击跳转） --- */
    .main-title {
        position: relative; z-index: 10;
        /* 修改点：增加间距，适配滚动流 */
        margin: 60px 0 30px; 
        font-size: 2.5rem; font-weight: 200; letter-spacing: 12px;
        text-transform: uppercase;
        text-shadow: 0 10px 25px rgba(0,0,0,0.5);
        opacity: 0.8; transition: var(--transition);
    }

    .main-title a {
        text-decoration: none; color: inherit; outline: none;
        transition: var(--transition);
    }

    .main-title a:hover {
        color: var(--accent);
        text-shadow: 0 4px 20px var(--accent);
    }

    /* --- 网格容器优化 --- */
    .container {
        position: relative; z-index: 10;
        width: 100%; max-width: 1100px; 
		margin-top: 100px;
        padding: 0 20px 60px; /* 底部留白防止遮挡下载按钮 */
        transition: var(--transition);
    }

    .clock-grid { 
        display: grid; 
        /* 修改点：自动适配列数，最小 280px 一列 */
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
        gap: 20px; 
    }
    
    .clock-card {
        border-radius: 20px; padding: 25px 15px; text-align: center; cursor: pointer;
        backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        transition: var(--transition); background: var(--glass-dark);
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .clock-card:hover { transform: translateY(-8px) translateZ(20px); border-color: var(--accent); background: rgba(0,0,0,0.45); }
    
    .city-label { font-size: 1.1rem; font-weight: 500; letter-spacing: 2px; margin-bottom: 8px; text-shadow: var(--text-shadow); }
    .time-label { font-size: 2.2rem; font-weight: 400; font-variant-numeric: tabular-nums; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    .date-label { font-size: 0.85rem; opacity: 0.7; margin-top: 5px; text-shadow: var(--text-shadow); }

    /* --- 聚焦模式（大气加粗） --- */
    #focusDisplay {
        position: fixed; top: 45%; left: 50%;
        transform: translate(-50%, -50%) scale(0.8) translateZ(100px);
        text-align: center; z-index: 20; opacity: 0; pointer-events: none;
        transition: var(--transition); width: 100%;
    }
    .focus-time { font-size: 12rem; font-weight: 00; line-height: 1; margin: 20px 0; text-shadow: 0 15px 50px rgba(0,0,0,0.6); }
    .focus-city { font-size: 3rem; font-weight: 600; letter-spacing: 8px; text-shadow: var(--text-shadow); }

    /* 状态切换控制 */
    body.is-focused .main-title { opacity: 0; transform: translateY(-20px); }
    body.is-focused #bgContainer { transform: rotateX(0deg) rotateY(0deg) translateZ(-100px) !important; transition: transform 0.6s ease; }
    body.is-focused #bgImage { filter: brightness(0.65) blur(15px); }
    body.is-focused #overlay { display: block; background: rgba(0,0,0,0.5); }
    body.is-focused .container { opacity: 0; transform: scale(0.95) translateZ(-50px); pointer-events: none; }
    body.is-focused #focusDisplay { opacity: 1; transform: translate(-50%, -50%) scale(1); }

    <!-- /* --- 下载按钮 --- */ -->

        <!-- position: fixed; bottom: 25px; right: 25px; -->

/* 按钮容器：放在右下角，使用 flex 布局让按钮并排 */
.action-group {
    position: fixed;
    bottom: 25px;
    right: 25px;
    z-index: 100;
    display: flex;
    gap: 12px; /* 按钮之间的间距 */
}

/* 统一按钮的基础样式 */
.action-btn {
    padding: 12px 20px;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 50px;
    color: white;
    font-size: 0.85rem;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: 0.3s;
    opacity: 0.7;
    cursor: pointer;
    outline: none;
}

.action-btn:hover {
    opacity: 1;
    transform: translateY(-3px);
    background: rgba(0, 0, 0, 0.6);
    border-color: var(--accent); /* 悬停时显示你定义的蓝色边框 */
}

/* 针对特定按钮的微调（如果需要） */
#downloadBtn {
    /* 继承 action-btn 样式 */
}
    /* --- 底部切换栏 --- */
    .mini-list {
        position: fixed; bottom: 80px; left: 0; width: 100%;
        display: flex; justify-content: center; gap: 12px;
        z-index: 30; opacity: 0; transform: translateY(20px);
        transition: var(--transition); pointer-events: none;
    }
    body.is-focused .mini-list { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .mini-item {
        padding: 10px 20px; border-radius: 12px; background: rgba(0,0,0,0.5); 
        backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        cursor: pointer; font-size: 0.9rem; transition: 0.3s; color: #ddd;
    }
    .mini-item:hover { background: var(--accent); color: #000; border-color: var(--accent); transform: translateZ(10px); }

    /* --- 点击波纹特效（优化厚度与色彩） --- */
    .click-ripple {
        position: fixed; z-index: 999;
        border: 2px solid var(--accent); /* 使用你定义的高亮色 */
        border-radius: 50%;
        pointer-events: none;
        transform: translate(-50%, -50%) scale(0);
        opacity: 1;
        animation: ripple-effect 0.6s ease-out;
    }

    @keyframes ripple-effect {
        to {
            transform: translate(-50%, -50%) scale(1);
            opacity: 0;
            width: 300px; height: 300px; /* 增大波纹感 */
        }
    }

    /* --- 移动端核心补丁 --- */
    @media (max-width: 768px) { 
        .main-title { font-size: 1.5rem; letter-spacing: 6px; margin: 40px 0 20px; }
        .focus-time { font-size: 4.5rem; } /* 缩小手机端聚焦字体，防止溢出 */
        .focus-city { font-size: 1.8rem; letter-spacing: 4px; }
        #bgContainer { transform: none !important; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* 手机端迷你栏改为允许横向滑动 */
        .mini-list {
            padding: 0 20px;
            justify-content: flex-start;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .mini-item { flex: 0 0 auto; }
    }
	.footer {
    position: fixed;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5; /* 确保在背景之上，但在卡片之下 */
    text-align: center;
    width: 100%;
    pointer-events: none; /* 默认穿透，不干扰点击 */
}

.footer p {
    font-size: 0.75rem;
    color: rgba(255, 255, 255, 0.4); /* 极简半透明 */
    letter-spacing: 1px;
    font-weight: 300;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
}

.footer a {
    color: rgba(255, 255, 255, 0.6);
    text-decoration: none;
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    transition: 0.3s;
    pointer-events: auto; /* 允许点击链接 */
}

.footer a:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
}

/* 移动端微调：防止遮挡下载按钮 */
@media (max-width: 768px) {
    .footer {
        bottom: 10px;
    }
    .footer p {
        font-size: 0.65rem;
        padding: 0 20px;
    }
}
</style>
</head>

    <script>
        const cities = [
            { name: '北京', tz: 'Asia/Shanghai' },
            { name: '纽约', tz: 'America/New_York' },
            { name: '莫斯科', tz: 'Europe/Moscow' },
            { name: '伦敦', tz: 'Europe/London' },
            { name: '东京', tz: 'Asia/Tokyo' },
            { name: '巴黎', tz: 'Europe/Paris' }
        ];

        let currentFocusIndex = null;
        let wallpaperUrl = '';

        const bodyEl = document.getElementById('body');
        const bgContainer = document.getElementById('bgContainer');

        function init() {
            // 获取随机壁纸
            const randomId = Math.floor(Math.random() * 1050);
            wallpaperUrl = `https://picsum.photos/id/${randomId}/1920/1080`;
            
            const bgImg = document.getElementById('bgImage');
            bgImg.style.backgroundImage = `url('${wallpaperUrl}')`;
            
            const dlBtn = document.getElementById('downloadBtn');
            dlBtn.href = wallpaperUrl;
            dlBtn.setAttribute('download', `wallpaper-${randomId}.jpg`);

            const grid = document.getElementById('clockGrid');
            grid.innerHTML = cities.map((c, i) => `
                <div class="clock-card" onclick="openFocus(${i})" id="card-${i}">
                    <div class="city-label">${c.name}</div>
                    <div class="time-label" id="time-${i}">00:00:00</div>
                    <div class="date-label" id="date-${i}">----</div>
                </div>
            `).join('');

            const mini = document.getElementById('miniList');
            mini.innerHTML = cities.map((c, i) => `
                <div class="mini-item" onclick="openFocus(${i})">${c.name}</div>
            `).join('');
            
            update();
            setInterval(update, 1000);

            // --- 绑定交互特效 ---
            initParallax();
            initClickEffect();
        }

        // --- 1. 背景 3D 视差特效 ---
        function initParallax() {
            if (window.innerWidth <= 768) return; // 手机端跳过

            document.addEventListener('mousemove', (e) => {
                // 如果处于聚焦模式，不执行视差，防止多重动画冲突
                if (bodyEl.classList.contains('is-focused')) return;

                const { clientX, clientY } = e;
                const { innerWidth, innerHeight } = window;

                // 计算鼠标相对于屏幕中心的偏移量 (-0.5 到 0.5)
                const offsetX = (clientX / innerWidth) - 0.5;
                const offsetY = (clientY / innerHeight) - 0.5;

                // 定义最大旋转角度和位移
                const maxRotateX = 8; // 度
                const maxRotateY = 12; // 度
                const maxTranslateZ = 15; // 像素 (营造向后退的感觉)

                // 应用 CSS 转换
                // 注意：由于图片比屏幕大，这里的偏移和旋转方向要反过来，营造深度
                const rotateX = offsetY * maxRotateX * -1;
                const rotateY = offsetX * maxRotateY;
                const translateZ = Math.abs(offsetX + offsetY) * maxTranslateZ * -1; // 鼠标越靠近边缘，图片越往后退

                bgContainer.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(${translateZ}px)`;
            });
        }

        // --- 2. 全屏点击水波纹特效 ---
        function initClickEffect() {
            document.addEventListener('click', (e) => {
                // 创建波纹元素
                const ripple = document.createElement('div');
                ripple.classList.add('click-ripple');
                
                // 设置初始大小为 0，定位在点击点
                ripple.style.width = '0px';
                ripple.style.height = '0px';
                ripple.style.left = `${e.clientX}px`;
                ripple.style.top = `${e.clientY}px`;

                // 添加到 body
                document.body.appendChild(ripple);

                // 动画结束后移除元素，防止 DOM 堆积
                ripple.addEventListener('animationend', () => {
                    ripple.remove();
                });
            });
        }

        function openFocus(index) {
            currentFocusIndex = index;
            bodyEl.classList.add('is-focused');
            updateFocusContent();
        }

        function closeFocus() {
            currentFocusIndex = null;
            bodyEl.classList.remove('is-focused');
        }

        function updateFocusContent() {
            if (currentFocusIndex === null) return;
            const c = cities[currentFocusIndex];
            const now = new Date();
            document.getElementById('f-city').textContent = c.name;
            document.getElementById('f-time').textContent = now.toLocaleTimeString('en-GB', { timeZone: c.tz, hour12: false });
            document.getElementById('f-date').textContent = now.toLocaleDateString('zh-CN', { timeZone: c.tz, dateStyle: 'full' });
        }

        function update() {
            const now = new Date();
            cities.forEach((c, i) => {
                const timeStr = now.toLocaleTimeString('en-GB', { timeZone: c.tz, hour12: false });
                const dateStr = now.toLocaleDateString('zh-CN', { timeZone: c.tz, month: 'long', day: 'numeric', weekday: 'short' });
                
                document.getElementById(`time-${i}`).textContent = timeStr;
                document.getElementById(`date-${i}`).textContent = dateStr;

                const hour = parseInt(timeStr.split(':')[0]);
                const card = document.getElementById(`card-${i}`);
                
                card.style.background = (hour >= 6 && hour < 18) ? "rgba(0,0,0,0.3)" : "rgba(0,0,0,0.45)";
            });

            if (currentFocusIndex !== null) updateFocusContent();
        }

        init();
    </script>
