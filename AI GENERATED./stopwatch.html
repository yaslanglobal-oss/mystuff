<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos Stopwatch - 秒表模式</title>
    <style>
        :root {
            --accent: #38bdf8;
            --bg: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--bg);
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 背景装饰 */
        .grid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        /* 计时器容器 */
        .stopwatch-container {
            text-align: center;
            width: 90%;
            max-width: 800px;
        }

        /* 数字显示区 */
        .display {
            font-variant-numeric: tabular-nums;
            font-weight: 200;
            letter-spacing: -2px;
            display: flex;
            justify-content: center;
            align-items: baseline;
            margin-bottom: 50px;
        }

        .unit-group { display: flex; flex-direction: column; align-items: center; margin: 0 10px; }
        .val { font-size: clamp(4rem, 15vw, 10rem); line-height: 1; }
        .label { font-size: 0.8rem; color: var(--accent); letter-spacing: 2px; margin-top: 10px; text-transform: uppercase; opacity: 0.6; }
        .sep { font-size: 4rem; opacity: 0.2; padding-bottom: 2rem; }

        /* 隐藏天数（默认） */
        #day_group { display: none; }

        /* 毫秒小数字 */
        .ms-val { font-size: 3rem; opacity: 0.4; margin-left: 10px; font-weight: 100; }

        /* 按钮组 */
        .controls { display: flex; gap: 20px; justify-content: center; }
        button {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        button:hover { border-color: var(--accent); background: rgba(56, 189, 248, 0.1); }
        button.primary { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
        
        /* 计次区域 */
        .laps-container {
            margin-top: 40px;
            height: 200px;
            overflow-y: auto;
            mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
        }
        .lap-row {
            display: flex; justify-content: space-between;
            padding: 10px 20px; border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 1rem; color: rgba(255,255,255,0.4);
        }
        .lap-row:first-child { color: var(--accent); }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="stopwatch-container">
        <div class="display">
            <div class="unit-group" id="day_group">
                <span class="val" id="d">00</span>
                <span class="label">Days</span>
            </div>
            <span class="sep" id="day_sep" style="display:none;">:</span>

            <div class="unit-group">
                <span class="val" id="h">00</span>
                <span class="label">Hrs</span>
            </div>
            <span class="sep">:</span>

            <div class="unit-group">
                <span class="val" id="m">00</span>
                <span class="label">Min</span>
            </div>
            <span class="sep">:</span>

            <div class="unit-group">
                <span class="val" id="s">00</span>
                <span class="label">Sec</span>
            </div>

            <span class="ms-val" id="ms">00</span>
        </div>

        <div class="controls">
            <button onclick="start()" id="mainBtn" class="primary">START</button>
            <button onclick="recordLap()">LAP</button>
            <button onclick="reset()">RESET</button>
        </div>

        <div class="laps-container" id="laps"></div>
    </div>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timer = null;
        let lapCount = 0;

        function start() {
            const btn = document.getElementById('mainBtn');
            if (timer) {
                // 暂停
                clearInterval(timer);
                timer = null;
                btn.innerText = "RESUME";
                btn.classList.remove('primary');
            } else {
                // 开始
                startTime = Date.now() - elapsedTime;
                timer = setInterval(update, 10);
                btn.innerText = "PAUSE";
                btn.classList.add('primary');
            }
        }

        function update() {
            elapsedTime = Date.now() - startTime;

            const ms = Math.floor((elapsedTime % 1000) / 10);
            const s = Math.floor((elapsedTime / 1000) % 60);
            const m = Math.floor((elapsedTime / 60000) % 60);
            const h = Math.floor((elapsedTime / 3600000) % 24);
            const d = Math.floor(elapsedTime / 86400000);

            // 天数逻辑：只有当大于0时才显示天数单元
            if (d > 0) {
                document.getElementById('day_group').style.display = 'flex';
                document.getElementById('day_sep').style.display = 'block';
                document.getElementById('d').innerText = d.toString().padStart(2, '0');
            }

            document.getElementById('h').innerText = h.toString().padStart(2, '0');
            document.getElementById('m').innerText = m.toString().padStart(2, '0');
            document.getElementById('s').innerText = s.toString().padStart(2, '0');
            document.getElementById('ms').innerText = ms.toString().padStart(2, '0');
        }

        function reset() {
            clearInterval(timer);
            timer = null;
            elapsedTime = 0;
            lapCount = 0;
            document.getElementById('day_group').style.display = 'none';
            document.getElementById('day_sep').style.display = 'none';
            document.getElementById('d').innerText = '00';
            document.getElementById('h').innerText = '00';
            document.getElementById('m').innerText = '00';
            document.getElementById('s').innerText = '00';
            document.getElementById('ms').innerText = '00';
            document.getElementById('laps').innerHTML = '';
            const btn = document.getElementById('mainBtn');
            btn.innerText = "START";
            btn.classList.add('primary');
        }

        function recordLap() {
            if (elapsedTime === 0) return;
            lapCount++;
            const timeStr = `${document.getElementById('h').innerText}:${document.getElementById('m').innerText}:${document.getElementById('s').innerText}.${document.getElementById('ms').innerText}`;
            const dayStr = document.getElementById('day_group').style.display === 'flex' ? document.getElementById('d').innerText + "d " : "";
            
            const div = document.createElement('div');
            div.className = 'lap-row';
            div.innerHTML = `<span>LAP ${lapCount}</span><span>${dayStr}${timeStr}</span>`;
            const container = document.getElementById('laps');
            container.insertBefore(div, container.firstChild);
        }
    </script>
</body>
</html>
